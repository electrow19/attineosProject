<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un livre</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
</body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <h2>Modifier le livre</h2>
    <form th:action="@{/livres/update-book/{id}(id=${livre.id})}" method="post">
        <input type="text" name="titre" th:value="${livre.titre}" required>
        <input type="text" name="auteur" th:value="${livre.auteur}" required>
        <input type="date" name="dateParution" th:value="${livre.dateParution}" required>
        <input type="text" name="synopsis" th:value="${livre.synopsis}" required>
        <input type="text" name="isbn" th:value="${livre.isbn}" required>
        <button type="submit">Mettre à jour</button>
    </form>
</body>
</html>
