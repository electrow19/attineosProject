services:

  biblio-app:
    image: biblio-app:latest
    container_name: biblio-app
    depends_on:
      - biblio-db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://biblio-db:5432/biblio
      SPRING_DATASOURCE_USERNAME: biblio
      SPRING_DATASOURCE_PASSWORD: biblio
    networks:
      - biblio-net

  biblio-db:
    image: postgres:16
    container_name: biblio-db
    environment:
      POSTGRES_DB: biblio
      POSTGRES_USER: biblio
      POSTGRES_PASSWORD: biblio
    volumes:
      - biblio_db:/var/lib/postgresql/data
    networks:
      - biblio-net

volumes:
  biblio_db:

networks:
  biblio-net:
